<!DOCTYPE html>
<html>
<head>
    <title>Register - SynapseOS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <div class="bg-circle one"></div>
<div class="bg-circle two"></div>



<div class="auth-box">

<img src="{{ url_for('static', filename='logo.png') }}" alt="SynapseOS Logo" class = "auth-logo">

        <h2 class = "brand-title">
            SynapseOS
        </h2>

        <p class ="brand-title">
          •Design • Architect • Intelligent Systems
        </p>
   <div class="auth-badge">
    Autonomous AI Engineering Platform
</div>

    <h1>Create Account</h1>
    <p>Join SynapseOS AI Engineering Platform</p>

    <form method="POST">
        <input type="text" name="username" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <p class="link-text">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>

</body>
</html>
